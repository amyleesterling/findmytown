name: Refresh Listings

on:
  schedule:
    # Run daily at 7am ET (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch listings from Redfin
        run: node scripts/fetch-listings.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/listings.json
          git diff --cached --quiet || git commit -m "Auto-refresh listings $(date -u +%Y-%m-%d)"
          git push
